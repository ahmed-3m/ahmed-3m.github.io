<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1117"/>
      <stop offset="100%" stop-color="#08090d"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect width="100" height="100" rx="20" fill="none" stroke="#1c2030" stroke-width="1.5"/>

  <!-- "A" — two diagonal strokes meeting at apex -->
  <!-- Left stroke -->
  <line x1="22" y1="80" x2="50" y2="20" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Right stroke -->
  <line x1="78" y1="80" x2="50" y2="20" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Crossbar -->
  <line x1="32" y1="57" x2="68" y2="57" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Accent dot at apex -->
  <circle cx="50" cy="20" r="5" fill="#00d4ff" filter="url(#glow)"/>
</svg>
