name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  # contents: write so the build job can commit a refreshed activity snapshot.
  # pages + id-token remain for the Pages deploy job.
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need a token-backed checkout so we can push the activity snapshot
          # back to main after a successful refresh (non-PR only).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Refresh the committed activity snapshot before the static export.
      # Script always exits 0; on failure the existing JSON is left untouched.
      - name: Fetch GitHub activity
        run: node .github/activity/fetch-activity.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Persist the snapshot so local/PR builds render without a token.
      # GITHUB_TOKEN pushes do not re-trigger workflows (no deploy loop).
      - name: Commit activity snapshot
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if git diff --quiet -- src/lib/github-activity.json; then
            echo "Activity snapshot unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/github-activity.json
          git commit -m "chore(activity): refresh GitHub activity snapshot"
          git push origin HEAD:${{ github.ref_name }}

      - name: Build
        run: npm run build
        env:
          # NEXT_PUBLIC_* tokens are inlined into the static JS bundle and are
          # publicly extractable. Use disposable, rate-limited free-tier keys only.
          # The news agent uses a separate private key (ZAI_NEWS_TOKEN) — see news-update.yml.
          NEXT_PUBLIC_GROQ_TOKEN: ${{ secrets.NEXT_PUBLIC_GROQ_TOKEN }}
          NEXT_PUBLIC_ZAI_TOKEN: ${{ secrets.NEXT_PUBLIC_ZAI_TOKEN }}

      - name: Package Pages artifact
        shell: sh
        run: |
          tar \
            --dereference --hard-dereference \
            --directory ./out \
            -cvf "$RUNNER_TEMP/github-pages.tar" \
            --exclude=.git \
            --exclude=.github \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar
          retention-days: 1
          if-no-files-found: error
          compression-level: 0

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
